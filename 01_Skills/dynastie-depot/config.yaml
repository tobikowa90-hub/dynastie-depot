# ─────────────────────────────────────────────
# SYSTEMREGELN (v3.3 — 06.04.2026)
# ─────────────────────────────────────────────
system_regeln:

  _system_version: "v3.4 — 06.04.2026"

  score_verfallsregel:
    beschreibung: "Score gilt 180 Tage ab score_datum. Danach: QuickCheck erzwingt Re-Analyse."
    formel: "score_valid_until = score_datum + 180 Tage"
    trigger: "Score-Alter > 180 Tage → automatischer Deep-Dive-Trigger im QuickCheck (Checkpunkt 7 Rot)"

  substitute_activation_global:
    beschreibung: "Ersatz-Aktivierungsregel für alle Satelliten. Einheitlich und bindend."
    vorbereitung_bei: "DEFCON 2 (Score 50–64) — Ersatz identifizieren + analysieren"
    ausfuehrung_bei: "DEFCON 1 (Score <50) ODER explizites Veto durch User"
    ersatz_voraussetzung: "Ersatz-Ticker muss zum Tauschzeitpunkt Score ≥80 + kein aktives FLAG haben"
    steuer_regel: "Niemals durch Verkauf tauschen — Sparplan auf Ersatz umleiten. Bei unvermeidbarem Verkauf: Abgeltungsteuer 26,375% + FIFO + Freibetragscheck"

  moat_drift_trigger:
    beschreibung: "Drei objektive Auslöser für automatischen !Analysiere-Trigger, unabhängig vom Score-Alter"
    trigger_1: "Morningstar Moat-Downgrade Wide → Narrow (sofort, score-unabhängig)"
    trigger_2: "Marktanteilsverlust >10% im Kernsegment — dokumentiert in Earnings Call / Pressebericht"
    trigger_3: "Gross Margin Rückgang >5 Prozentpunkte über 4 aufeinanderfolgende Quartale (Shibui cash_flow_quarterly + Macrotrends)"
    aktion: "Sofortiger !Analysiere — kein Warten auf Score-Verfall"

  sparplan_verteilung:
    beschreibung: "Formelle Berechnungsregel für !Rebalancing. Verbindlich."
    gewichte: "DEFCON-4-Clean = 1.0 | DEFCON-3 = 0.5 | FLAG (beliebig) = 0.0"
    formel: "Einzelrate = Aktien-Budget (285€) / Σ Gewichte × Eigengewicht"
    beispiel: |
      Annahme: 8× DEFCON-4-Clean + 2× DEFCON-3 + 1× FLAG
      Nenner = (8 × 1.0) + (2 × 0.5) + (1 × 0.0) = 9.0
      D4-Einzelrate = 285€ / 9.0 × 1.0 = 31,67€
      D3-Einzelrate = 285€ / 9.0 × 0.5 = 15,83€
      FLAG-Einzelrate = 0€
      Summencheck: (8 × 31,67) + (2 × 15,83) + 0 = 285€ ✓

  tariff_exposure_quelle:
    beschreibung: "Primärquelle für Tariff-Exposure-Scoring (Pflicht bei jedem !Analysiere)"
    quelle_1: "SEC EDGAR 10-K / 20-F → Abschnitt 'Geographic Revenue' (primär, maschinenlesbar)"
    quelle_2: "Earnings Call Transcript (defeatbeta get_stock_earning_call_transcript) → Management-Kommentar zu Zöllen"
    quelle_3: "Simply Wall St 'Company Analysis' → Schätzung (Fallback wenn keine exakten Daten)"
    schwelle_check: "CN + TW + MY + TH + VN Anteil an Revenue + Supply-Chain-Anteil > 35% → FLAG"

