# --- Screener-Exceptions ---
# Ticker mit nicht-standardmaessigem Cashflow-Profil.
# Fuer diese werden angepasste Metriken verwendet (siehe thresholds.md).
screener_exceptions:
  - ticker: BRK.B
    grund: "Float-basiertes Holding-Modell"
    ersatz_metriken: ["price_book", "combined_ratio"]
  - ticker: MKL
    grund: "Specialty Insurance + Ventures"
    ersatz_metriken: ["price_book", "combined_ratio"]
  - ticker: FFH.TO
    grund: "Insurance Holding"
    ersatz_metriken: ["price_book", "combined_ratio"]

# --- Screening-Status (wird vom Screener vorgeschlagen, User bestaetigt) ---
